<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Sci-Fi AI & Radar HUD</title>
    
    <!-- HANYA MEMANGGIL FILE LOKAL (Duplikasi CDN Online Sudah Dihapus Bersih) -->
    <script src="p5.js"></script>
    <script src="ml5.min.js"></script>
    
    <style>
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background: #060a07; 
            color: #00ff66; 
            margin: 0; 
            text-align: center; 
            padding: 15px;
            overflow-x: hidden;
        }
        h2 {
            letter-spacing: 4px;
            text-shadow: 0 0 10px #00ff66;
            margin-bottom: 5px;
        }
        #canvas-container { 
            display: flex; 
            justify-content: center; 
            margin-top: 10px; 
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
            border-radius: 4px;
            display: inline-block;
        }
        .hud-panel {
            display: flex;
            justify-content: center;
            gap: 40px;
            max-width: 1000px;
            margin: 0 auto;
            font-weight: bold;
        }
        .info { 
            font-size: 1.1em; 
            background: rgba(0, 255, 102, 0.1);
            padding: 8px 15px;
            border: 1px solid #00ff66;
            border-radius: 4px;
            text-shadow: 0 0 5px #00ff66; 
            min-width: 250px;
        }
        #log-container {
            max-width: 1000px;
            margin: 15px auto 0 auto;
            background: #020503;
            border: 1px solid rgba(0, 255, 102, 0.3);
            height: 100px;
            overflow-y: auto;
            text-align: left;
            padding: 10px;
            font-size: 0.85em;
            color: #00cc55;
            border-radius: 4px;
        }
        .log-entry { margin: 2px 0; }
        .log-alert { color: #ff3344; font-weight: bold; }
    </style>
</head>
<body>

    <h2>⚡ TACTICAL RADAR & AI HUD SYSTEM ⚡</h2>
    
    <div class="hud-panel">
        <div class="info" id="radar-val">RANGE: -- CM</div>
        <div class="info" id="ai-status">INITIALIZING SYSTEM MATRIX...</div>
    </div>

    <div id="canvas-container"></div>
    
    <div id="log-container">
        <div class="log-entry">[SYSTEM] Core AI Engine Booted. Awaiting Stream...</div>
    </div>

    <script>
        const wsIP = "ws://192.168.4.1:81"; 
        
        let socket; let video; let detector;
        let detections = []; let jarakSensor = 100; 
        let radarAngle = 0; let lastState = "0";
        let trailLength = 40; 
        let audioCtx; let lastBeepTime = 0;

        function setup() {
            let canvas = createCanvas(1000, 450);
            canvas.parent('canvas-container');
            
            // Mengatur kamera belakang HP (environment) agar menyala otomatis
            video = createCapture({ audio: false, video: { facingMode: "environment" } });
            video.size(500, 450); video.hide();

            detector = ml5.objectDetector('cocossd', () => {
                select('#ai-status').html('AI STATUS: ACTIVE // SCANNING');
                addLog("[AI] Object detector model loaded.", false);
                speakNotification("System active. AI scanning initiated.");
                detector.detect(video, gotDetections);
            });

            connectSocket(); 
        }

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // FUNGSI ALARM GAHAR (Sawtooth Wave + High Volume)
        function playHeavyAlarm(frequency, duration) {
            try {
                initAudio();
                if (!audioCtx) return;
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                
                osc.type = 'sawtooth'; 
                osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
                
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        // FUNGSI SUARA PEMBERITAHUAN ROBOT (Text-to-Speech)
        function speakNotification(textMessage) {
            if ('speechSynthesis' in window) {
                let speech = new SpeechSynthesisUtterance(textMessage);
                speech.lang = 'en-US';
                speech.pitch = 0.8; 
                speech.rate = 1.0;  
                window.speechSynthesis.speak(speech);
            }
        }

        // FUNGSI GETAR HAPE (Vibration API)
        function triggerHaptic(duration) {
            if (navigator.vibrate) {
                navigator.vibrate(duration); 
            }
        }

        function connectSocket() {
            socket = new WebSocket(wsIP);
            socket.onopen = () => { addLog("[NET] Connected to Master node.", false); };
            socket.onmessage = (event) => {
                let prevJarak = jarakSensor;
                jarakSensor = int(event.data);
                select('#radar-val').html('RANGE: ' + jarakSensor + ' CM');
                
                if(abs(prevJarak - jarakSensor) > 5) {
                    addLog("[RADAR] Shift detected: " + jarakSensor + " cm", false);
                }
            };
            socket.onclose = () => { setTimeout(connectSocket, 2000); };
        }

        function gotDetections(error, results) {
            if (!error) { detections = results; }
            detector.detect(video, gotDetections);
        }

        function addLog(message, isAlert) {
            let logBox = select('#log-container');
            let timeStr = new Date().toLocaleTimeString();
            let className = isAlert ? 'log-entry log-alert' : 'log-entry';
            logBox.html(logBox.html() + `<div class="${className}">[${timeStr}] ${message}</div>`);
            logBox.elt.scrollTop = logBox.elt.scrollHeight;
        }

        function draw() {
            background(10, 16, 12);
            image(video, 0, 0, 500, 450);
            
            // Overlay Grid Efek Kamera
            stroke(0, 255, 102, 15); strokeWeight(1);
            for (let y = 0; y < height; y += 4) { line(0, y, 500, y); }

            let personFound = false;

            for (let i = 0; i < detections.length; i++) {
                let obj = detections[i];
                stroke(0, 255, 102); strokeWeight(2); noFill();
                rect(obj.x, obj.y, obj.width, obj.height, 4);
                
                fill(0, 255, 102, 200); noStroke();     rect(obj.x, obj.y - 22, obj.width, 22);
                fill(0, 0, 0);          textSize(13);   text(obj.label.toUpperCase(), obj.x + 6, obj.y - 6);

                if (obj.label === "person") { personFound = true; }
            }

            if (socket && socket.readyState === WebSocket.OPEN) {
                let currentState = personFound ? "1" : "0";
                if (currentState !== lastState) {
                    socket.send(currentState);
                    lastState = currentState;
                    if(personFound) {
                        addLog("[SYS ALERT] LOCK: Human signature verified!", true);
                        triggerHaptic([300, 100, 300]); 
                        speakNotification("Warning. Human target locked.");
                        playHeavyAlarm(600, 0.4);
                    } else {
                        addLog("[SYS] Target lost.", false);
                    }
                }
            }

            stroke(0, 255, 102, 60); strokeWeight(2); line(500, 0, 500, height);

            // SISI KANAN: HUD RADAR
            let centerX = 750; let centerY = 225;
            noFill(); stroke(0, 255, 102, 35); strokeWeight(1);
            for(let r = 50; r <= 200; r += 50) { ellipse(centerX, centerY, r*2, r*2); }
            line(centerX - 220, centerY, centerX + 220, centerY);
            line(centerX, centerY - 220, centerX, centerY + 220);
            
            fill(0, 255, 102, 80); textSize(11); noStroke();
            text("0°", centerX + 225, centerY + 4);    text("180°", centerX - 255, centerY + 4);
            text("90°", centerX - 10, centerY + 235);  text("270°", centerX - 10, centerY - 228);

            textSize(12);
            if (jarakSensor < 40) {
                fill(255, 51, 68, 200);
                text("⚠️ DANGER CLOSE", centerX - 50, centerY - 15);
            } else {
                fill(0, 255, 102, 120);
                text("SYSTEM: SCANNING_MODE", centerX - 68, centerY - 15);
            }

            // Sapuan Radar
            radarAngle += 0.035;
            for (let i = 0; i < trailLength; i++) {
                let currentAlpha = map(i, 0, trailLength, 200, 0);
                stroke(0, 255, 102, currentAlpha);
                let angleOffset = radarAngle - (i * 0.015);
                let x2 = centerX + cos(angleOffset) * 200;
                let y2 = centerY + sin(angleOffset) * 200;
                line(centerX, centerY, x2, y2);
            }

            let radiusObjek = map(jarakSensor, 0, 100, 0, 200, true);
            
            if (jarakSensor < 100) {
                let objX = centerX + cos(radarAngle - 0.2) * radiusObjek;
                let objY = centerY + sin(radarAngle - 0.2) * radiusObjek;
                
                let pulseSize = 15 + sin(frameCount * 0.2) * 8;
                stroke(255, 51, 68, 180); strokeWeight(1.5); noFill();
                ellipse(objX, objY, pulseSize, pulseSize);
                
                stroke(255, 51, 68, 220);
                line(objX - 10, objY, objX + 10, objY);
                line(objX, objY - 10, objX, objY + 10);
                
                fill(255, 51, 68); noStroke();
                ellipse(objX, objY, 6, 6);
                
                fill(255, 51, 68, 240); textSize(11);
                text("TRGT [" + jarakSensor + "cm]", objX + 12, objY + 4);

                // Pola Bunyi Alarm
                let beepInterval = map(jarakSensor, 10, 100, 100, 800, true); 
                if (millis() - lastBeepTime > beepInterval) {
                    let alarmFreq = map(jarakSensor, 10, 100, 900, 400, true);
                    playHeavyAlarm(alarmFreq, 0.12);
                    
                    if (jarakSensor < 40) {
                        triggerHaptic(50);
                    }
                    lastBeepTime = millis();
                }
            }
        }
    </script>
</body>
</html>
